<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSE</title>
    <style type="text/css" media="screen">
        /* Add style here from the gist */
    </style>
</head>
<body onload="onLoaded()">
<h1>Server Sent Events</h1>
<div id="main">
    <h3 id="rand-container">Random Number</h3>
    <div id="random-number"></div>
</div>
<script>
    const onLoaded = () => {
        let es = new EventSource("https://localhost:4433/random");
        es.onmessage = (event) => {
            document.getElementById("random-number").innerHTML = event.data;
            console.log(event.data, new Date().toLocaleString());
        };
        /*es.addEventListener("message", (event) => {
                console.log(event.data, new Date().toLocaleString());
            }
        );
        es.addEventListener('join', event => {
            alert(`${event.data} зашёл`);
        });

        es.addEventListener('leave', event => {
            alert(`${event.data} вышел`);
        });*/
    };
</script>
</body>
</html>
