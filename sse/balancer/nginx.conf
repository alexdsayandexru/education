events {}

http {
    upstream go_servers {
        server host.docker.internal:8881;
        server host.docker.internal:8882;
        server host.docker.internal:8883;
        server host.docker.internal:8884;
    }

    server {
        listen       80;

        location / {
            proxy_pass http://go_servers;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
        }
    }
}
